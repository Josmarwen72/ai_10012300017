services:
  - type: web
    name: acity-rag-assistant
    env: python
    plan: free
    buildCommand: "pip install -r requirements-render.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT flask_ui.app:app"
    healthCheckPath: /
    envVars:
      - key: ACITY_DATA_DIR
        value: /opt/render/project/data
      - key: PYTHONPATH
        value: /opt/render/project
